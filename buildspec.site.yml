version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: "22"
    commands:
      - npm install -g pnpm@10.17.1
      - cd site && pnpm install --frozen-lockfile

  build:
    commands:
      - cd site && pnpm build

  post_build:
    commands:
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "Syncing dist/ to S3..."
          aws s3 sync site/dist/ s3://$S3_SITE_BUCKET/ --delete --cache-control "public,max-age=31536000,immutable" --exclude "*.html"
          aws s3 sync site/dist/ s3://$S3_SITE_BUCKET/ --delete --cache-control "no-cache" --include "*.html"
          echo "Invalidating CloudFront cache..."
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
        else
          echo "Build failed — skipping deploy."
        fi

artifacts:
  files:
    - "**/*"
  base-directory: site/dist
