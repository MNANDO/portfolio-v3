version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: "22"
    commands:
      - corepack enable
      - corepack prepare pnpm@10.17.1 --activate
      - pnpm install --frozen-lockfile

  build:
    commands:
      - pnpm build

  post_build:
    commands:
      - echo "Syncing dist/ to S3..."
      - aws s3 sync dist/ s3://$S3_SITE_BUCKET/ --delete --cache-control "public,max-age=31536000,immutable" --exclude "*.html"
      - aws s3 sync dist/ s3://$S3_SITE_BUCKET/ --delete --cache-control "no-cache" --include "*.html"
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"

artifacts:
  files:
    - "**/*"
  base-directory: dist

cache:
  paths:
    - node_modules/.pnpm-store/**/*
    - node_modules/**/*
